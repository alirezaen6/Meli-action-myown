name: Telegram Downloader via yt-dlp

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: 'لیست لینک‌های عمومی تلگرام (جدا شده با فاصله)، مثال: https://t.me/s/Channel/12345'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔍 Debug – show input links
        run: |
          echo ">>> telegram_links = '${{ github.event.inputs.telegram_links }}'"

      - name: 🛠 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg zip
          python3 -m pip install --upgrade yt-dlp

      - name: 🚀 Download with yt-dlp (force IPv4)
        run: |
          mkdir -p downloads
          for LINK in ${{ github.event.inputs.telegram_links }}; do
            echo ">>>> Downloading: $LINK"
            yt-dlp \
              --force-ipv4 \
              --ignore-errors \
              --no-playlist \
              --no-overwrites \
              --no-part \
              -o "downloads/%(uploader)s_%(id)s_%(title)s.%(ext)s" \
              "$LINK"
          done

      - name: 🔍 Debug – list contents of downloads
        run: |
          echo ">>> ls -lha downloads"
          ls -lha downloads || echo "downloads is empty or missing"

      - name: 📂 Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-downloads
          path: downloads/

      - name: 📤 Commit & Push downloads (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # پوشه‌ی downloads رو حتماً بساز
          mkdir -p downloads

          # اگر خالیه اسکیپ کن
          if [ -z "$(ls -A downloads)" ]; then
            echo "✅ هیچ فایل جدیدی برای commit وجود ندارد."
            exit 0
          fi

          git add downloads
          git commit -m "Add telegram downloads [skip ci]"
          git push

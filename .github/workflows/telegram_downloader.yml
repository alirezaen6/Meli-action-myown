name: Telegram Downloader via yt-dlp

on:
  workflow_dispatch:
    inputs:
      telegram_links:
        description: 'لیست لینک‌های عمومی تلگرام (جدا شده با فاصله)، مثال: https://t.me/s/Channel/12345'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: 🛠 Install dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg zip
          python3 -m pip install --upgrade yt-dlp

      - name: 🚀 Download files with yt-dlp
        run: |
          mkdir -p downloads
          # حلقه روی همه لینک‌ها
          for LINK in ${{ github.event.inputs.telegram_links }}; do
            yt-dlp \
              --ignore-errors \
              --no-playlist \
              --no-overwrites \
              --no-part \
              -o "downloads/%(uploader)s_%(id)s_%(title)s.%(ext)s" \
              "$LINK"
          done

      - name: 🔀 Sanitize filenames
        run: |
          cd downloads
          for f in *; do
            [ -e "$f" ] || continue
            CLEAN=$(echo "$f" | sed 's/[^a-zA-Z0-9._-]/_/g')
            [ "$f" = "$CLEAN" ] || mv -- "$f" "$CLEAN"
          done

      - name: 📂 Upload as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: telegram-downloads
          path: downloads/

      # (اختیاری) در صورت تمایل می‌توانید به جای آپلود آرتیفکت، 
      # فایل‌ها را در خود repo کامیت کنید:
      
       - name: 📤 Commit & Push downloads
         run: |
           git config user.name "github-actions[bot]"
           git config user.email "github-actions[bot]@users.noreply.github.com"
           git add downloads/*
           git commit -m "Add telegram downloads [skip ci]" || echo "No changes to commit"
           git push
